<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediksi Popularitas Lagu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white text-center">
                        <h3>Prediksi Regresi Linear</h3>
                    </div>
                    <div class="card-body">
                        <p class="text-muted text-center">Studi Kasus: Pengaruh Loudness terhadap Popularitas Lagu</p>
                        
                        <form method="POST">
                            <div class="mb-3">
                                <label for="loudness" class="form-label">Masukkan Nilai Loudness:</label>
                                <input type="number" step="any" name="loudness" class="form-control" placeholder="Contoh: -5.4" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Hitung Prediksi</button>
                        </form>

                        {% if prediction is not none %}
                        <div class="mt-4 alert alert-success text-center">
                            <h5>Hasil Prediksi untuk Loudness {{ loudness }}:</h5>
                            <h2 class="display-6 font-weight-bold">{{ prediction }}</h2>
                            <p>Skala Popularitas</p>
                        </div>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
